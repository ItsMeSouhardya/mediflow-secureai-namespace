# Nginx configuration for the production frontend container — task 15.11
# Proxies /api/* to the backend service; serves Vite SPA with HTML5 history fallback.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                                  always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self';
         style-src 'self' https://fonts.googleapis.com;
         font-src 'self' https://fonts.gstatic.com;
         img-src 'self' data:;
         connect-src 'self' wss:;
         frame-ancestors 'none';"
        always;

    # ── API proxy (pass to backend container on port 5000) ──────────────────
    location /api/ {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        # SSE streams need buffering disabled.
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets aggressively; index.html is no-store.
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Hide Nginx version
    server_tokens off;
}
