services:
  - type: web
    name: mediflow-secureai-souhardya-api
    runtime: python
    plan: free
    region: singapore
    autoDeployTrigger: commit
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m flask --app app db upgrade && gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mediflow-secureai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mediflow-secureai-cache
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: keyvalue
          name: mediflow-secureai-cache
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: METRICS_SECRET_KEY
        sync: false
      - key: BLOCKCHAIN_REFERENCE_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://mediflow-secureai-souhardya.onrender.com
      - key: MFA_REQUIRED_FOR_STAFF
        value: "false"
      - key: DOCUMENT_STORAGE_BACKEND
        value: s3
      - key: DOCUMENT_ENCRYPTION_KEY
        sync: false
      - key: DOCUMENT_S3_BUCKET
        sync: false
      - key: DOCUMENT_S3_REGION
        value: auto
      - key: DOCUMENT_S3_ENDPOINT_URL
        sync: false
      - key: DOCUMENT_S3_ACCESS_KEY
        sync: false
      - key: DOCUMENT_S3_SECRET_KEY
        sync: false
      - key: TELEMEDICINE_JITSI_DOMAIN
        value: meet.jit.si
      - key: TELEMEDICINE_JITSI_APP_ID
        value: mediflow
      - key: TELEMEDICINE_JITSI_SECRET
        value: ""
      - key: BLOCKCHAIN_ENABLED
        value: "false"
      - key: BLOCKCHAIN_CHAIN_ID
        value: "11155111"
      - key: BLOCKCHAIN_CONFIRMATIONS
        value: "1"
      - key: BLOCKCHAIN_DEVELOPMENT_UNLOCKED_ACCOUNT
        value: "false"

  - type: web
    name: mediflow-secureai-souhardya
    runtime: static
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://mediflow-secureai-souhardya-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

  - type: keyvalue
    name: mediflow-secureai-cache
    plan: free
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off

databases:
  - name: mediflow-secureai-db
    plan: free
    region: singapore
    databaseName: mediflow
    user: mediflow
    postgresMajorVersion: "18"
